# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: soc-agent

requiredVersions:
  extensions:
    azure.ai.agents: '>=0.1.0-preview'

infra:
  provider: bicep
  path: ./infra

# Auto-bind AZURE_SUBSCRIPTION_ID (and prompt for AZURE_LOCATION if missing)
# from the active Azure CLI context before provisioning. The azure.ai.agents
# extension requires AZURE_SUBSCRIPTION_ID to be set in the azd env, and this
# hook spares the user from having to set it manually.
hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./scripts/preprovision.ps1
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: ./scripts/preprovision.sh
      continueOnError: false
      interactive: true

services:
  # Microsoft Foundry hosted agent (GitHub Copilot SDK via invocations protocol)
  #
  # Model deployment values below are intentionally hardcoded (not
  # substituted from env vars). The `azure.ai.agents` extension parses this
  # block as typed JSON, and azd's `${VAR=default}` substitution always
  # produces strings — which fails type-checking on `capacity` (int) and
  # `version` (typed string). To change the model, edit this block AND keep
  # `AZURE_AI_MODEL_DEPLOYMENT_NAME` / `MODEL_VERSION` / `MODEL_SKU` /
  # `MODEL_CAPACITY` env vars in sync (they drive the Bicep deployment).
  copilot-agent:
    project: src/copilot-agent
    host: azure.ai.agent
    language: docker
    docker:
      remoteBuild: true
    config:
      container:
        resources:
          cpu: "0.5"
          memory: 1Gi
      deployments:
        - model:
            format: OpenAI
            name: gpt-4o-mini
            version: "2024-07-18"
          name: gpt-4o-mini
          sku:
            capacity: 30
            name: GlobalStandard
      startupCommand: python main.py

  # Sample MCP HTTP server (Container App on the MCP subnet)
  mcp-http-server:
    project: src/mcp-http-server
    host: containerapp
    language: docker
