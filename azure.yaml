# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: soc-agent

requiredVersions:
  extensions:
    azure.ai.agents: '>=0.1.0-preview'

infra:
  provider: bicep
  path: ./infra

# Auto-bind AZURE_SUBSCRIPTION_ID (and prompt for AZURE_LOCATION if missing)
# from the active Azure CLI context before provisioning. The azure.ai.agents
# extension requires AZURE_SUBSCRIPTION_ID to be set in the azd env, and this
# hook spares the user from having to set it manually.
hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./scripts/preprovision.ps1
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: ./scripts/preprovision.sh
      continueOnError: false
      interactive: true

services:
  # Microsoft Foundry hosted agent (GitHub Copilot SDK via invocations protocol).
  #
  # The deployments block below is REGENERATED by scripts/preprovision on
  # first run, between the SOC_AGENT_MODEL_DEPLOYMENT markers. To change the
  # model after the first run, either:
  #   1. Edit the block directly (it's plain YAML), or
  #   2. Clear the model env vars and re-run `azd provision`:
  #        azd env set AZURE_AI_MODEL_DEPLOYMENT_NAME ""
  #        azd provision    # the hook will re-prompt and rewrite this block
  copilot-agent:
    project: src/copilot-agent
    host: azure.ai.agent
    language: docker
    docker:
      remoteBuild: true
    config:
      container:
        resources:
          cpu: "0.5"
          memory: 1Gi
      deployments:
        # >>> SOC_AGENT_MODEL_DEPLOYMENT — managed by scripts/preprovision >>>
        - model:
            format: OpenAI
            name: gpt-5.4
            version: "2026-03-05"
          name: gpt-5.4
          sku:
            capacity: 500
            name: GlobalStandard
        # <<< SOC_AGENT_MODEL_DEPLOYMENT <<<
      startupCommand: python main.py

  # Sample MCP HTTP server (Container App on the MCP subnet)
  mcp-http-server:
    project: src/mcp-http-server
    host: containerapp
    language: docker
